<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">김주희 프로필 대체 이미지</title>
  <desc id="desc">노란색 배경 위에 김주희 이름 이니셜을 배치한 프로필 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4c0"/>
      <stop offset="0.48" stop-color="#f3c64d"/>
      <stop offset="1" stop-color="#b97905"/>
    </linearGradient>
    <radialGradient id="glow" cx="34%" cy="24%" r="68%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <circle cx="330" cy="260" r="360" fill="url(#glow)"/>
  <circle cx="930" cy="940" r="350" fill="#3a2a14" opacity="0.18"/>
  <rect x="188" y="188" width="824" height="824" rx="230" fill="#fffdf6" opacity="0.22"/>
  <text x="600" y="560" text-anchor="middle" font-family="Noto Serif KR, serif" font-size="170" font-weight="700" fill="#3a2a14">김주희</text>
  <text x="600" y="680" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="54" font-weight="700" letter-spacing="10" fill="#5c3a05">AI LECTURER</text>
  <text x="600" y="760" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="42" font-weight="600" fill="#6f4b09">Full-stack Developer</text>
</svg>
